services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # REST + dashboard
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: graphlens
      POSTGRES_PASSWORD: graphlens
      POSTGRES_DB: graphlens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U graphlens"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build: ./graphlens-backend
    ports:
      - "8000:8000"
    env_file:
      - ./graphlens-backend/.env
    environment:
      # Override host-targeted defaults so the container talks to siblings.
      QDRANT_URL: http://qdrant:6333
      DATABASE_URL: postgresql+psycopg2://graphlens:graphlens@postgres:5432/graphlens
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

volumes:
  qdrant_data:
  postgres_data:
  redis_data:
