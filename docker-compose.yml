services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # REST + dashboard
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: graphlens
      POSTGRES_PASSWORD: graphlens
      POSTGRES_DB: graphlens
    ports:
      # Host 5433 -> container 5432 to avoid clashing with a native Postgres
      # already bound to host 5432. Container-to-container still uses 5432.
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U graphlens"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build: ./graphlens-backend
    ports:
      - "8000:8000"
    env_file:
      - ./graphlens-backend/.env
    environment:
      # Override host-targeted defaults so the container talks to siblings.
      QDRANT_URL: http://qdrant:6333
      DATABASE_URL: postgresql+psycopg2://graphlens:graphlens@postgres:5432/graphlens
      REDIS_URL: redis://redis:6379
    volumes:
      # Mount the shared GraphRAG workspace so the indexed graph is available
      # in the container (graph artifacts live on the host).
      - ./graphlens-backend/graphrag_workspace:/app/graphrag_workspace
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./graphlens-frontend
      args:
        # Baked into the client bundle → must be the host-reachable backend URL.
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      # Server-side (NextAuth) reaches the backend over the compose network.
      API_INTERNAL_URL: http://backend:8000
      AUTH_SECRET: ${AUTH_SECRET:-dev-secret-change-me-in-prod}
      AUTH_TRUST_HOST: "true"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  qdrant_data:
  postgres_data:
  redis_data:
